databases:
  - name: tryggve-db
    plan: free
    postgresMajorVersion: "15"

services:
  - type: web
    name: tryggve-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tryggve-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: tryggve-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
